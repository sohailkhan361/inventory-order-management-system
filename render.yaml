services:
  - type: web
    runtime: docker
    name: inventory-order-api
    plan: free
    region: singapore
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-order-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false

databases:
  - name: inventory-order-db
    databaseName: inventory_db
    user: inventory_user
    plan: free
    region: singapore
    postgresMajorVersion: "18"
    ipAllowList: []
